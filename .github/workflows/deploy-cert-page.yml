name: Deploy Certificate Page

on:
  workflow_dispatch:
    inputs:
      certificate_number:
        description: 'Certificate number (e.g. KC-2026-007)'
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: https://tfcuozmbnnswencikncv.supabase.co
      SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRmY3Vvem1ibm5zd2VuY2lrbmN2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDc5MzU1NDUsImV4cCI6MjA2MzUxMTU0NX0.37WDHXS2HV81Oj_V8i_HkDbXWLVkzuUA-GSZgS3YckA

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate certificate HTML
        run: node .github/scripts/gen-cert.mjs
        env:
          CERTIFICATE_NUMBER: ${{ inputs.certificate_number }}
          SUPABASE_URL: ${{ env.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ env.SUPABASE_ANON_KEY }}
          OUT_DIR: /tmp/cert-page

      - name: Checkout website repo
        uses: actions/checkout@v4
        with:
          repository: voiz-academy/kithclimate-site
          token: ${{ secrets.GH_DEPLOY_TOKEN }}
          path: site

      - name: Copy page and push
        run: |
          mkdir -p site/verify/${{ inputs.certificate_number }}
          cp /tmp/cert-page/index.html site/verify/${{ inputs.certificate_number }}/index.html
          cd site
          git config user.name "Kith Climate Bot"
          git config user.email "noreply@kithclimate.com"
          git add verify/${{ inputs.certificate_number }}/index.html
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Add certificate page for ${{ inputs.certificate_number }}"
          git push
